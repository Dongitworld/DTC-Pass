<!DOCTYPE html>
<html>
<head>
    <title>Bus Pass</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            height: 95vh;
        }

        img {
            height: 100%;
            width: auto;
            display: block;
            border-radius: 10px;
        }

        /* 🔲 PERFECTED overlay */
        .overlay {
            position: absolute;
            top: 71.2%; /* 🔥 very fine tuned */
            left: 50%;
            transform: translate(-50%, -50%);
            
            padding: 3px 37px; /* 👈 tighter fit */
            
            /* smooth fade edges */
            background: radial-gradient(
                ellipse at center,
                rgba(255,255,255,0.95) 60%,
                rgba(255,255,255,0.6) 80%,
                rgba(255,255,255,0) 100%
            );
        }

        /* ✨ better sized blinking text */
        .blink {
            font-size: 3.7vh; /* 🔥 scales with screen height */
            font-weight: bold;
            color: #76b37a;
            letter-spacing: 1px;
            animation: blinkAnim 1.8s infinite;
            top: -3px; /* move text UP */
        }

        @keyframes blinkAnim {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

    </style>
</head>

<body>

<div class="container">
    <img src="image.jpeg" alt="Bus Pass">

    <div class="overlay">
        <span class="blink">7502032695035</span>
    </div>
</div>

</body>
</html>
