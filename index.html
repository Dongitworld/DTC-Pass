<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Image</title>
    <style>
        body, html {
            margin: 0;
            height: 100%;
            background-color: black; /* fills empty space nicely */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* shows full image */
        }
    </style>
</head>
<body>
    <img src="WhatsApp Image 2026-05-01 at 7.59.10 AM.jpeg" alt="Image">
</body>
</html>
