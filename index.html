<!DOCTYPE html>
<html>
<head>
    <title>Bus Pass</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            height: 95vh;
        }

        img {
            height: 100%;
            width: auto;
            display: block;
            border-radius: 10px;
        }

        /* 🔲 overlay FIXED */
        .overlay {
            position: absolute;
            top: 72%; /* 🔥 moved slightly UP */
            left: 50%;
            transform: translate(-50%, -50%);
            
            background: rgba(255, 255, 255, 0.95); /* 👈 more visible */
            padding: 6px 14px;
            border-radius: 6px;
            
            border: 1px solid rgba(0,0,0,0.1); /* subtle edge */
        }

        /* ✨ blinking number FIXED */
        .blink {
            font-size: 20px; /* 🔥 increased size */
            font-weight: bold;
            color: #76b37a; /* closer to original */
            letter-spacing: 1px;
            animation: blinkAnim 1s infinite;
        }

        @keyframes blinkAnim {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

    </style>
</head>

<body>

<div class="container">
    <img src="image.jpeg" alt="Bus Pass">

    <div class="overlay">
        <span class="blink">1234567890123</span>
    </div>
</div>

</body>
</html>
