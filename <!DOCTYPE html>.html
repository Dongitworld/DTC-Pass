<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Screen Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* fills screen, may crop */
        }
    </style>
</head>
<body>
    <img src="WhatsApp Image 2026-04-30 at 4.57.43 PM.jpeg" alt="Full Screen Image">
</body>
</html>
